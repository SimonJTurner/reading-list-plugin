name: Release Obsidian plugin

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint, format, and typecheck
        run: npm run verify

      - name: Verify tag matches manifest version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TAG="${TAG#v}"
          VER=$(node -p "require('./manifest.json').version")
          if [ "$TAG" != "$VER" ]; then
            echo "Release tag must match manifest.json version (use 1.2.3 or v1.2.3); got tag '$TAG', manifest '$VER'"
            exit 1
          fi

      - name: Build plugin
        run: npm run build:release

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/main.js
            dist/manifest.json
            dist/styles.css
          generate_release_notes: true
